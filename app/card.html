<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital business card — CompanyCard</title>
<meta name="description" content="A CompanyCard digital business card. Tap to save the contact — no app needed.">
<link rel="icon" href="../assets/logo-icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&family=Marcellus&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
<link rel="stylesheet" href="app.css">
</head>
<body class="viewer">
  <div class="wrap">
    <div id="view"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="product.js"></script>
  <script>
  (function () {
    var view = document.getElementById("view");
    function toast(m) { var t = document.getElementById("toast"); t.textContent = m; t.classList.add("show"); clearTimeout(t._t); t._t = setTimeout(function () { t.classList.remove("show"); }, 2200); }

    var card = null;
    var h = location.hash || "";
    var m = h.match(/c=([^&]+)/);
    if (m) card = CC.decode(m[1]);
    if (!card) { var id = new URLSearchParams(location.search).get("id"); if (id) card = CC.get(id); }

    if (!card || !card.name) {
      view.innerHTML =
        '<div class="cc-shell" style="padding:40px 28px;text-align:center">' +
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 388 84" width="388" height="84" role="img" aria-label="CompanyCard" class="logo-lockup" style="height:30px;margin:0 auto 18px"><rect x="9" y="18" width="74" height="48" rx="9" stroke="#1A1814" stroke-width="2" fill="none"/><path d="M 57.19,26.81 A 13,13 0 1 0 57.19,45.19" stroke="#1A1814" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3"/><path d="M 43.19,36.81 A 13,13 0 1 0 43.19,55.19" stroke="#1A1814" stroke-width="6" stroke-linecap="round" fill="none"/><text x="104" y="56.5" font-family="Marcellus, Georgia, serif" font-size="42" letter-spacing="1" fill="#1A1814">CompanyCard</text></svg>' +
        '<h2 style="margin-bottom:8px">No card to show</h2>' +
        '<p style="color:var(--slate-500);margin-bottom:22px">This link doesn\'t contain a card yet.</p>' +
        '<a class="btn btn-primary btn-lg" href="builder.html">Create your free card</a></div>';
      return;
    }

    document.title = card.name + " — CompanyCard";

    var qrCard = card.showQR ? "" :
      '<div class="qr-card"><h3>Scan to open</h3><p>Point a camera here to share this card.</p>' +
      '<div class="qrbox" id="qr" style="margin-top:14px"></div></div>';
    view.innerHTML =
      '<div class="cc-shell" id="cc">' + CC.renderCard(card) + '</div>' +
      qrCard +
      '<div class="made"><a class="btn btn-ghost" href="builder.html">' +
      '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Make your own CompanyCard</a></div>';

    var ccEl = document.getElementById("cc");
    ccEl.addEventListener("click", function (e) {
      if (e.target.closest("[data-save]")) { e.preventDefault(); CC.downloadVcard(card); toast("Contact downloaded"); }
    });

    if (card.showQR) { CC.fillQR(ccEl, card); }
    else { var qel = document.getElementById("qr"); if (!CC.qr(qel, location.href, 168)) CC.qr(qel, CC.shareUrl(card, true), 168); }
  })();
  </script>
</body>
</html>
