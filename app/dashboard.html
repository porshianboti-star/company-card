<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My cards — CompanyCard</title>
<meta name="description" content="Manage your CompanyCard digital business cards.">
<link rel="icon" href="../assets/logo-icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&family=Marcellus&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
<link rel="stylesheet" href="app.css">
</head>
<body>

<header class="app-bar">
  <div class="inner">
    <a class="brand" href="../index.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 388 84" width="388" height="84" role="img" aria-label="CompanyCard" class="logo-lockup"><rect x="9" y="18" width="74" height="48" rx="9" stroke="#1A1814" stroke-width="2" fill="none"/><path d="M 57.19,26.81 A 13,13 0 1 0 57.19,45.19" stroke="#1A1814" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3"/><path d="M 43.19,36.81 A 13,13 0 1 0 43.19,55.19" stroke="#1A1814" stroke-width="6" stroke-linecap="round" fill="none"/><text x="104" y="56.5" font-family="Marcellus, Georgia, serif" font-size="42" letter-spacing="1" fill="#1A1814">CompanyCard</text></svg></a>
    <span class="sp"></span>
    <a class="tab hide-sm" href="team.html">Team</a>
    <a class="tab active" href="dashboard.html">My cards</a>
    <span id="acct-slot"></span>
    <a class="btn btn-ghost" href="#" data-signout style="display:none" data-authonly>Sign out</a>
    <a class="btn btn-primary" id="new-card-btn" href="builder.html">New card</a>
  </div>
</header>

<main class="wrap-app">
  <div class="dash-head">
    <div>
      <h1>My cards</h1>
      <p style="color:var(--slate-500);margin-top:4px;">Create, edit and share your digital business cards.</p>
    </div>
    <a class="btn btn-primary btn-lg" href="builder.html">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Create a card
    </a>
  </div>
  <div id="list"></div>
</main>

<!-- SHARE MODAL -->
<div class="modal" id="share-modal" role="dialog" aria-modal="true" aria-labelledby="share-modal-title" hidden>
  <div class="modal-box">
    <button class="modal-x" id="modal-close" type="button" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    <h3 id="share-modal-title">Share this card</h3>
    <p class="sub">Scan the code or copy the link.</p>
    <div class="qrbox" id="share-qr"></div>
    <p class="sub" id="qr-note" hidden style="color:var(--indigo-600)">QR opens a lite version; the copied link includes photos.</p>
    <div class="share-link">
      <input class="inp" id="share-url" type="text" readonly>
      <button class="btn btn-primary" id="copy-link" type="button">Copy</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>CCAuth.guard("admin");</script>
<script src="product.js"></script>
<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var list = $("list");
  function toast(m) { var t = $("toast"); t.textContent = m; t.classList.add("show"); clearTimeout(t._t); t._t = setTimeout(function () { t.classList.remove("show"); }, 2200); }

  var ICON = {
    share: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>',
    del: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>'
  };

  function render() {
    var cards = CC.all();
    if (!cards.length) {
      list.innerHTML =
        '<div class="empty-state"><div class="em-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M3 10h18M7 15h5"/></svg></div>' +
        '<h2>No cards yet</h2><p>Create your first digital business card — it takes about a minute.</p>' +
        '<a class="btn btn-primary btn-lg" href="builder.html">Create your free card</a></div>';
      return;
    }
    var grid = document.createElement("div"); grid.className = "cards-grid";
    cards.forEach(function (c) {
      var t = CC.themeOf(c), tbg = CC.bgOf(c);
      var av = c.photo ? '<img src="' + c.photo + '" alt="">' : CC.initials(c.name);
      var sub = [c.title, c.company].filter(Boolean).map(CC.esc).join(" · ") || "&nbsp;";
      var n = (c.fields || []).filter(function (f) { return (f.value || "").trim(); }).length;
      var tile = document.createElement("div"); tile.className = "ctile";
      tile.innerHTML =
        '<div class="mini"><div class="mc" style="background:' + tbg.grad + '"></div>' +
        '<div class="ma" style="background:' + (c.photo ? "#fff" : t.grad) + '">' + av + '</div>' +
        '<div class="mt"><b>' + CC.esc(c.name || "Untitled") + '</b><span>' + sub + '</span>' +
        '<span style="margin-top:4px;color:var(--slate-400);font-size:.78rem">' + n + ' link' + (n === 1 ? "" : "s") + '</span></div></div>' +
        '<div class="ops">' +
        '<a class="btn btn-ghost" href="card.html?id=' + c.id + '">Open</a>' +
        '<a class="btn btn-ghost" href="builder.html?id=' + c.id + '">Edit</a>' +
        '<button class="btn btn-ghost ic" type="button" data-share="' + c.id + '" aria-label="Share">' + ICON.share + '</button>' +
        '<button class="btn btn-ghost ic" type="button" data-del="' + c.id + '" aria-label="Delete">' + ICON.del + '</button>' +
        '</div>';
      grid.appendChild(tile);
    });
    list.innerHTML = ""; list.appendChild(grid);
  }

  list.addEventListener("click", function (e) {
    var s = e.target.closest("[data-share]"), d = e.target.closest("[data-del]");
    if (s) {
      var c = CC.get(s.getAttribute("data-share")); if (!c) return;
      var full = CC.shareUrl(c); $("share-url").value = full;
      var note = $("qr-note"), ok = CC.qr($("share-qr"), full, 192);
      if (!ok) { CC.qr($("share-qr"), CC.shareUrl(c, true), 192); if (note) note.hidden = false; }
      else if (note) { note.hidden = true; }
      $("share-modal").hidden = false;
    } else if (d) {
      var id = d.getAttribute("data-del"); var c2 = CC.get(id);
      if (confirm('Delete "' + (c2 ? c2.name : "this card") + '"? This cannot be undone.')) { CC.remove(id); toast("Card deleted"); render(); }
    }
  });

  $("modal-close").addEventListener("click", function () { $("share-modal").hidden = true; });
  $("share-modal").addEventListener("click", function (e) { if (e.target === $("share-modal")) $("share-modal").hidden = true; });
  $("copy-link").addEventListener("click", function () {
    var inp = $("share-url"); inp.select();
    function done() { toast("Link copied"); }
    if (navigator.clipboard) { navigator.clipboard.writeText(inp.value).then(done, function () { document.execCommand("copy"); done(); }); }
    else { document.execCommand("copy"); done(); }
  });

  /* account chip + upgrade */
  function renderAcct() {
    var slot = $("acct-slot"); if (!slot) return;
    if (CC.isPro()) slot.innerHTML = '<span class="plan-chip pro">PRO</span>';
    else if (CC.isAuthed()) slot.innerHTML = '<a class="btn btn-ghost btn-upgrade" href="checkout.html?return=' + encodeURIComponent("dashboard.html") + '">Upgrade to Pro</a>';
    else slot.innerHTML = "";
  }

  /* free plan allows CC.FREE_CARD_LIMIT cards — gate creating more */
  function canNewCard() { return CC.isPro() || CC.all().length < CC.FREE_CARD_LIMIT; }
  document.addEventListener("click", function (e) {
    var a = e.target.closest('a[href="builder.html"]'); if (!a) return;
    if (canNewCard()) return;
    e.preventDefault();
    location.href = "checkout.html?feat=multiCard&return=" + encodeURIComponent("dashboard.html");
  });

  var qs = new URLSearchParams(location.search);
  if (qs.get("upgraded") && CC.isPro()) toast("Welcome to Pro 🎉");

  renderAcct();
  render();
})();
</script>
<script>
(function(){ if (window.CCAuth && CCAuth.enabled) CCAuth.init().then(function(p){
  if (p) document.querySelectorAll("[data-authonly]").forEach(function(el){ el.style.display=""; });
}); })();
</script>
</body>
</html>
